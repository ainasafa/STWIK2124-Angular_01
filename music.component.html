<h2>Music Management System</h2>

<button>Add Music</button>

<table>
  <tr>
    <th>Title</th>
    <th>Artist</th>
    <th>YouTube Link</th>
    <th>Action</th>
  </tr>

  <tr *ngFor="let music of musicList">
    <td>{{music.title}}</td>
    <td>{{music.artist}}</td>
    <td>
      <a [href]="music.youtubeLink" target="_blank">
        Watch
      </a>
    </td>
    <td>
      <button>Delete</button>
    </td>
  </tr>

</table>
